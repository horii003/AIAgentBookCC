AWSTemplateFormatVersion: "2010-09-09"
Description: "交通費・経費精算申請エージェント用 Bedrock Guardrails v1.0"

Resources:
  ExpenseAgentGuardrail:
    Type: AWS::Bedrock::Guardrail
    Properties:
      Name: "expense-agent-guardrail"
      Description: "交通費・経費精算申請エージェント用ガードレール v1.0"

      BlockedInputMessaging: |
        その話題は有害または不適切である可能性があるため、情報を提供できません。
        安全にお手伝いできる別の内容についてご質問ください。

      BlockedOutputsMessaging: |
        そのような種類のコンテンツは、有害または不適切である可能性があるため生成できません。
        他にお手伝いできることがあればお知らせください。

      ContentPolicyConfig:
        ContentFiltersTierConfig:
          TierName: "STANDARD"
        FiltersConfig:
          - Type: "VIOLENCE"
            InputStrength: "HIGH"
            OutputStrength: "HIGH"
            InputAction: "BLOCK"
            OutputAction: "BLOCK"

          - Type: "PROMPT_ATTACK"
            InputStrength: "HIGH"
            OutputStrength: "NONE"
            InputAction: "BLOCK"

          - Type: "MISCONDUCT"
            InputStrength: "HIGH"
            OutputStrength: "HIGH"
            InputAction: "BLOCK"
            OutputAction: "BLOCK"

          - Type: "HATE"
            InputStrength: "HIGH"
            OutputStrength: "HIGH"
            InputAction: "BLOCK"
            OutputAction: "BLOCK"

          - Type: "SEXUAL"
            InputStrength: "HIGH"
            OutputStrength: "HIGH"
            InputAction: "BLOCK"
            OutputAction: "BLOCK"

          - Type: "INSULTS"
            InputStrength: "MEDIUM"
            OutputStrength: "MEDIUM"
            InputAction: "BLOCK"
            OutputAction: "BLOCK"

      WordPolicyConfig:
        ManagedWordListsConfig:
          - Type: "PROFANITY"
            InputEnabled: true
            OutputEnabled: true
            InputAction: "BLOCK"
            OutputAction: "BLOCK"
        WordsConfig: []

      SensitiveInformationPolicyConfig:
        PiiEntitiesConfig:
          - Type: "NAME"
            InputEnabled: false
            OutputEnabled: true
            Action: "ANONYMIZE"
          - Type: "EMAIL"
            InputEnabled: false
            OutputEnabled: true
            Action: "BLOCK"
          - Type: "PHONE"
            InputEnabled: false
            OutputEnabled: true
            Action: "BLOCK"
          - Type: "ADDRESS"
            InputEnabled: false
            OutputEnabled: true
            Action: "ANONYMIZE"
        RegexesConfig: []

      Tags:
        - Key: "Name"
          Value: "expense-agent-guardrail"
        - Key: "Region"
          Value: "ap-northeast-1"

Outputs:
  GuardrailId:
    Description: "Bedrock Guardrail のリソース ID"
    Value: !GetAtt ExpenseAgentGuardrail.GuardrailId
    Export:
      Name: !Sub "${AWS::StackName}-GuardrailId"

  GuardrailArn:
    Description: "Bedrock Guardrail の ARN"
    Value: !GetAtt ExpenseAgentGuardrail.GuardrailArn
    Export:
      Name: !Sub "${AWS::StackName}-GuardrailArn"

  GuardrailVersion:
    Description: "Bedrock Guardrail のバージョン"
    Value: !GetAtt ExpenseAgentGuardrail.Version
    Export:
      Name: !Sub "${AWS::StackName}-GuardrailVersion"
