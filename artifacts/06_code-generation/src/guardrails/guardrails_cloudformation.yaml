# 参照: DD-05 ガードレール詳細設計書, SR-13 ガードレール要件定義
AWSTemplateFormatVersion: "2010-09-09"
Description: "申請AIエージェントシステム用 Amazon Bedrock Guardrails"

Resources:
  ExpenseApplicationGuardrail:
    Type: AWS::Bedrock::Guardrail
    Properties:
      Name: "expense-application-guardrail"
      Description: "申請AIエージェントシステム用ガードレール v1.0"

      # DD-05 2節: ブロック時のメッセージ（日本語）
      BlockedInputMessaging: |
        その話題は有害または不適切である可能性があるため、情報を提供できません。
        安全にお手伝いできる別の内容についてご質問ください。

      BlockedOutputsMessaging: |
        そのような種類のコンテンツは、有害または不適切である可能性があるため生成できません。
        他にお手伝いできることがあればお知らせください。

      # DD-05 3節: コンテンツフィルター（STANDARD層）
      ContentPolicyConfig:
        ContentFiltersTierConfig:
          TierName: "STANDARD"
        FiltersConfig:
          - Type: "VIOLENCE"
            InputStrength: "HIGH"
            OutputStrength: "HIGH"
            InputAction: "BLOCK"
            OutputAction: "BLOCK"

          - Type: "PROMPT_ATTACK"
            InputStrength: "HIGH"
            OutputStrength: "NONE"
            InputAction: "BLOCK"

          - Type: "MISCONDUCT"
            InputStrength: "HIGH"
            OutputStrength: "HIGH"
            InputAction: "BLOCK"
            OutputAction: "BLOCK"

          - Type: "HATE"
            InputStrength: "HIGH"
            OutputStrength: "HIGH"
            InputAction: "BLOCK"
            OutputAction: "BLOCK"

          - Type: "SEXUAL"
            InputStrength: "HIGH"
            OutputStrength: "HIGH"
            InputAction: "BLOCK"
            OutputAction: "BLOCK"

          - Type: "INSULTS"
            InputStrength: "HIGH"
            OutputStrength: "HIGH"
            InputAction: "BLOCK"
            OutputAction: "BLOCK"

      # DD-05 4節: 単語ポリシー（PROFANITY: マネージド単語リスト）
      WordPolicyConfig:
        ManagedWordListsConfig:
          - Type: "PROFANITY"
            InputEnabled: true
            OutputEnabled: true
            InputAction: "BLOCK"
            OutputAction: "BLOCK"
        WordsConfig: []

      # DD-05 5節: 機密情報ポリシー（PII）
      SensitiveInformationPolicyConfig:
        PiiEntitiesConfig:
          # NAME: 出力のみANONYMIZE（入力では申請者名等の業務情報を含むため対象外）
          - Type: "NAME"
            InputEnabled: false
            OutputEnabled: true
            OutputAction: "ANONYMIZE"

          # EMAIL: 入出力ともBLOCK
          - Type: "EMAIL"
            InputEnabled: false
            OutputEnabled: true
            OutputAction: "BLOCK"

          # PHONE: 入出力ともBLOCK
          - Type: "PHONE"
            InputEnabled: false
            OutputEnabled: true
            OutputAction: "BLOCK"

          # ADDRESS: 出力のみANONYMIZE
          - Type: "ADDRESS"
            InputEnabled: false
            OutputEnabled: true
            OutputAction: "ANONYMIZE"

          # クレジットカード番号: 入出力ともBLOCK
          - Type: "CREDIT_DEBIT_CARD_NUMBER"
            InputEnabled: true
            OutputEnabled: true
            InputAction: "BLOCK"
            OutputAction: "BLOCK"

          # 銀行口座番号: 入出力ともBLOCK
          - Type: "BANK_ACCOUNT_NUMBER"
            InputEnabled: true
            OutputEnabled: true
            InputAction: "BLOCK"
            OutputAction: "BLOCK"

        RegexesConfig: []

      # DD-05 7節: タグ
      Tags:
        - Key: "Name"
          Value: "expense-application-guardrail"
        - Key: "Environment"
          Value: "production"

Outputs:
  GuardrailId:
    Description: "Bedrock Guardrail のリソース ID（環境変数 GUARDRAIL_ID に設定する）"
    Value: !GetAtt ExpenseApplicationGuardrail.GuardrailId
    Export:
      Name: !Sub "${AWS::StackName}-GuardrailId"

  GuardrailArn:
    Description: "Bedrock Guardrail の ARN"
    Value: !GetAtt ExpenseApplicationGuardrail.GuardrailArn
    Export:
      Name: !Sub "${AWS::StackName}-GuardrailArn"

  GuardrailVersion:
    Description: "Bedrock Guardrail のバージョン（環境変数 GUARDRAIL_VERSION に設定する）"
    Value: !GetAtt ExpenseApplicationGuardrail.Version
    Export:
      Name: !Sub "${AWS::StackName}-GuardrailVersion"
